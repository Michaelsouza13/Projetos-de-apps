<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            width: 280px;
            padding: 20px;
            margin: 0;
            text-align: center;
            background-color: #f8f9fa;
        }

        .cabecalho {
            margin-bottom: 20px;
        }

        .cabecalho h3 {
            margin: 0;
            color: #202124;
            font-size: 18px;
        }

        .cabecalho p {
            margin: 5px 0 0 0;
            color: #5f6368;
            font-size: 13px;
        }

        #status-caixa {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
            margin-bottom: 20px;
            font-weight: 500;
            font-size: 14px;
            color: #3c4043;
        }

        #btn-login {
            background: linear-gradient(135deg, #4285f4, #1a73e8);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            width: 100%;
            transition: 0.2s;
            display: none;
            /* Começa escondido */
        }

        #btn-login:hover {
            background: linear-gradient(135deg, #3b78e7, #1558d6);
            box-shadow: 0 4px 10px rgba(66, 133, 244, 0.3);
        }
    </style>
</head>

<body>

    <div class="cabecalho">
        <h3>Exportador PMI</h3>
        <p>Conecte sua conta para iniciar</p>
    </div>

    <div id="status-caixa">Verificando conexão...</div>

    <button id="btn-login">Fazer Login no Google</button>

    <script src="popup.js"></script>
</body>

</html>
